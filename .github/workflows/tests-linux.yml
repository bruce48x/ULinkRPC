name: Tests Linux

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Inspect workspace
        run: |
          pwd
          ls
          find tests -maxdepth 2 -name "*.csproj" -print

      - name: Restore test projects
        run: |
          for project in $(find tests -maxdepth 2 -name "*.csproj" -print); do
            dotnet restore "$project"
          done

      - name: Test runtime core
        run: dotnet test "${{ github.workspace }}/tests/ULinkRPC.Tests/ULinkRPC.Tests.csproj" --no-restore -m:1 /nr:false /p:UseSharedCompilation=false

      - name: Test code generator
        run: dotnet test "${{ github.workspace }}/tests/ULinkRPC.CodeGen.Tests/ULinkRPC.CodeGen.Tests.csproj" --no-restore -m:1 /nr:false /p:UseSharedCompilation=false

      - name: Test serializers
        run: dotnet test "${{ github.workspace }}/tests/ULinkRPC.Serializer.Tests/ULinkRPC.Serializer.Tests.csproj" --no-restore -m:1 /nr:false /p:UseSharedCompilation=false

      - name: Test transports
        run: dotnet test "${{ github.workspace }}/tests/ULinkRPC.Transport.Tests/ULinkRPC.Transport.Tests.csproj" --no-restore -m:1 /nr:false /p:UseSharedCompilation=false
