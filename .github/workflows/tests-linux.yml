name: Tests Linux

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore test projects
        run: |
          dotnet restore tests/ULinkRPC.Tests/ULinkRPC.Tests.csproj
          dotnet restore tests/ULinkRPC.CodeGen.Tests/ULinkRPC.CodeGen.Tests.csproj
          dotnet restore tests/ULinkRPC.Serializer.Tests/ULinkRPC.Serializer.Tests.csproj
          dotnet restore tests/ULinkRPC.Transport.Tests/ULinkRPC.Transport.Tests.csproj

      - name: Test runtime core
        run: dotnet test tests/ULinkRPC.Tests/ULinkRPC.Tests.csproj --no-restore -m:1 /nr:false /p:UseSharedCompilation=false

      - name: Test code generator
        run: dotnet test tests/ULinkRPC.CodeGen.Tests/ULinkRPC.CodeGen.Tests.csproj --no-restore -m:1 /nr:false /p:UseSharedCompilation=false

      - name: Test serializers
        run: dotnet test tests/ULinkRPC.Serializer.Tests/ULinkRPC.Serializer.Tests.csproj --no-restore -m:1 /nr:false /p:UseSharedCompilation=false

      - name: Test transports
        run: dotnet test tests/ULinkRPC.Transport.Tests/ULinkRPC.Transport.Tests.csproj --no-restore -m:1 /nr:false /p:UseSharedCompilation=false
