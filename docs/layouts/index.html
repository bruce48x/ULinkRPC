{{ define "main" }}
  <section class="hero">
    <p class="eyebrow">Unity + .NET</p>
    <h1>{{ .Site.Title }}</h1>
    <p class="lead">{{ .Site.Params.description }}</p>
    <div class="hero-actions">
      <a class="button primary" href="{{ "/posts/" | relURL }}">Read Docs</a>
      <a class="button" href="{{ .Site.Params.repo }}">GitHub</a>
    </div>
  </section>
  <section class="post-list">
    <h2>Latest Posts</h2>
    {{ range first 5 (where site.RegularPages "Section" "posts") }}
      <article class="post-card">
        <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        <p class="meta">{{ .Date.Format "2006-01-02" }}</p>
        {{ with .Summary }}<div class="summary">{{ . }}</div>{{ end }}
      </article>
    {{ end }}
  </section>
{{ end }}
